<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PAMPİŞUP — Yayın Cihazı</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0b0f19">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #0b0f19;
    --card-bg: rgba(255, 255, 255, 0.03);
    --card-border: rgba(255, 255, 255, 0.08);
    --primary: #0066FF;
    --primary-hover: #3385ff;
    --danger: #FF3B30;
    --danger-hover: #ff5c53;
    --text-main: #FFFFFF;
    --text-muted: rgba(255, 255, 255, 0.5);
    --font-family: 'Inter', sans-serif;
  }
  
  * { box-sizing: border-box; }
  
  html, body {
    margin: 0; padding: 0; height: 100%;
  }
  
  body {
    background: var(--bg-color);
    color: var(--text-main);
    font-family: var(--font-family);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    background-image: radial-gradient(circle at 50% -20%, rgba(0, 102, 255, 0.15) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  .logo {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    margin: 0 0 5px;
    background: linear-gradient(135deg, #fff 0%, #a5c8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    margin: 0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .glass-panel {
    width: 100%;
    max-width: 480px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .video-container {
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--card-border);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  video.active {
    opacity: 1;
  }

  .video-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 14px;
    gap: 12px;
    transition: opacity 0.3s;
  }

  .pulse-ring {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pulse-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .live .pulse-dot {
    background: var(--danger);
    box-shadow: 0 0 10px var(--danger);
    animation: pulse 1.5s infinite;
  }
  
  @keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
  }

  .status-indicator.connected {
    color: #34C759;
  }

  .status-indicator.connected::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #34C759;
    box-shadow: 0 0 8px #34C759;
  }

  .status-indicator.waiting::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .btn {
    width: 100%;
    padding: 18px;
    border-radius: 16px;
    border: none;
    font-family: var(--font-family);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #fff;
  }

  .btn:active {
    transform: scale(0.98);
  }

  .btn-primary {
    background: var(--primary);
    box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
  }

  .btn-primary:hover {
    background: var(--primary-hover);
  }

  .btn-danger {
    background: var(--danger);
    box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3);
    display: none;
  }

  .btn-danger:hover {
    background: var(--danger-hover);
  }

  .footer-note {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    max-width: 300px;
    line-height: 1.5;
  }
</style>
</head>
<body>

  <header>
    <h1 class="logo">PAMPİŞUP</h1>
    <p class="subtitle">Yayın Cihazı</p>
  </header>

  <div class="glass-panel">
    
    <div class="video-container" id="videoContainer">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="video-overlay" id="overlay">
        <div class="pulse-ring"><div class="pulse-dot"></div></div>
        <span id="overlayText">Kamera Kapalı</span>
      </div>
    </div>

    <div class="status-row">
      <span>İzleyici Bağlantısı</span>
      <div class="status-indicator waiting" id="viewerStatus">Bekleniyor</div>
    </div>

    <button class="btn btn-primary" id="startBtn">Kamerayı Paylaş</button>
    <button class="btn btn-danger" id="stopBtn">Yayını Durdur</button>

  </div>

  <p class="footer-note">Bu sayfa açık kaldığı sürece kamera paylaşıma hazır olur. İstediğiniz an durdurabilirsiniz.</p>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const localVideo = document.getElementById('localVideo');
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlayText');
  const videoContainer = document.getElementById('videoContainer');
  const viewerStatus = document.getElementById('viewerStatus');

  let peer = null;
  let localStream = null;
  let activeDataConnections = [];

  function setLive(isLive) {
    if(isLive) {
      startBtn.style.display = 'none';
      stopBtn.style.display = 'flex';
      videoContainer.classList.add('live');
      localVideo.classList.add('active');
      overlay.style.opacity = '0';
    } else {
      startBtn.style.display = 'flex';
      stopBtn.style.display = 'none';
      videoContainer.classList.remove('live');
      localVideo.classList.remove('active');
      overlay.style.opacity = '1';
      overlayText.textContent = 'Kamera Kapalı';
      viewerStatus.className = 'status-indicator waiting';
      viewerStatus.textContent = 'Bekleniyor';
    }
  }

  function initPeer() {
    peer = new Peer('pampisup-cihaz'); 
    
    // İzleyici sinyal göndermek için data connection kuracak
    peer.on('connection', conn => {
      activeDataConnections.push(conn);
      
      conn.on('data', data => {
        if(data.action === 'request_stream') {
          // Yayın açıksa izleyiciye doğru call başlat
          if(localStream) {
            viewerStatus.className = 'status-indicator connected';
            viewerStatus.textContent = 'Bağlandı';
            peer.call(conn.peer, localStream);
          } else {
            conn.send({ error: 'Kamera henüz paylaşılmadı.' });
          }
        }
      });

      conn.on('close', () => {
        activeDataConnections = activeDataConnections.filter(c => c !== conn);
        if(activeDataConnections.length === 0) {
          viewerStatus.className = 'status-indicator waiting';
          viewerStatus.textContent = 'Bekleniyor';
        }
      });
    });

    peer.on('error', err => {
      console.error("Peer hatası:", err);
    });
  }

  startBtn.addEventListener('click', async () => {
    try {
      overlayText.textContent = 'Kamera açılıyor...';
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      localVideo.srcObject = localStream;
      setLive(true);
      
      if(!peer) initPeer();
      
      // Halihazırda bağlı bekleyen izleyici varsa onlara yayını gönder
      activeDataConnections.forEach(conn => {
        viewerStatus.className = 'status-indicator connected';
        viewerStatus.textContent = 'Bağlandı';
        peer.call(conn.peer, localStream);
      });

    } catch(err) {
      alert("Kameraya erişilemedi. Lütfen izinleri kontrol edin.");
      overlayText.textContent = 'Kamera Kapalı';
    }
  });

  stopBtn.addEventListener('click', () => {
    if(localStream){
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    setLive(false);
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
</script>
</body>
</html>
