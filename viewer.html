<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PAMPİŞUP — İzleyici</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0b0f19">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #0b0f19;
    --card-bg: rgba(255, 255, 255, 0.03);
    --card-border: rgba(255, 255, 255, 0.08);
    --primary: #0066FF;
    --primary-hover: #3385ff;
    --text-main: #FFFFFF;
    --text-muted: rgba(255, 255, 255, 0.5);
    --font-family: 'Inter', sans-serif;
  }
  
  * { box-sizing: border-box; }
  
  html, body {
    margin: 0; padding: 0; height: 100%;
  }
  
  body {
    background: var(--bg-color);
    color: var(--text-main);
    font-family: var(--font-family);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    background-image: radial-gradient(circle at 50% -20%, rgba(0, 102, 255, 0.15) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  .logo {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    margin: 0 0 5px;
    background: linear-gradient(135deg, #fff 0%, #a5c8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    margin: 0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .glass-panel {
    width: 100%;
    max-width: 480px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .video-container {
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--card-border);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  video.active {
    opacity: 1;
  }

  .video-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 14px;
    text-align: center;
    padding: 20px;
    transition: opacity 0.3s;
  }

  .btn {
    width: 100%;
    padding: 18px;
    border-radius: 16px;
    border: none;
    font-family: var(--font-family);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #fff;
    background: var(--primary);
    box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
  }

  .btn:active {
    transform: scale(0.98);
  }

  .btn:hover {
    background: var(--primary-hover);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .footer-note {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    max-width: 300px;
    line-height: 1.5;
  }
</style>
</head>
<body>

  <header>
    <h1 class="logo">PAMPİŞUP</h1>
    <p class="subtitle">Canlı İzleme</p>
  </header>

  <div class="glass-panel">
    
    <div class="video-container">
      <video id="remoteVideo" playsinline></video>
      <div class="video-overlay" id="overlay">
        <span id="overlayText">Bağlantı bekleniyor...</span>
      </div>
    </div>

    <button class="btn" id="connectBtn">Canlı Yayına Bağlan</button>

  </div>

  <p class="footer-note">Görüntünün gelebilmesi için yayıncı cihazın kamerasının açık olması gerekir.</p>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
  const connectBtn = document.getElementById('connectBtn');
  const remoteVideo = document.getElementById('remoteVideo');
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlayText');

  let peer = new Peer(); // İzleyiciye rastgele bir ID atanıyor
  let dataConnection = null;

  // Cihaz (yayıncı) bizi aradığında:
  peer.on('call', call => {
    // Sadece aramayı cevapla, kendi stream'imizi göndermiyoruz
    call.answer(); 
    
    call.on('stream', remoteStream => {
      remoteVideo.srcObject = remoteStream;
      
      // Video geldiğinde oynatmayı zorla
      remoteVideo.play().then(() => {
        remoteVideo.classList.add('active');
        overlay.style.opacity = '0';
        connectBtn.textContent = 'Canlı Yayın İzleniyor';
        connectBtn.disabled = true;
      }).catch(err => {
        console.error("Video oynatılamadı:", err);
        overlayText.textContent = "Oynatmak için ekrana dokunun";
        overlay.style.opacity = '1';
        
        // Ekrana dokunma olayında tekrar deneme
        const playFallback = () => {
          remoteVideo.play();
          remoteVideo.classList.add('active');
          overlay.style.opacity = '0';
          document.removeEventListener('click', playFallback);
        };
        document.addEventListener('click', playFallback);
      });
    });

    call.on('close', () => {
      remoteVideo.classList.remove('active');
      overlay.style.opacity = '1';
      overlayText.textContent = "Bağlantı kesildi.";
      connectBtn.textContent = 'Tekrar Bağlan';
      connectBtn.disabled = false;
    });
  });

  connectBtn.addEventListener('click', () => {
    overlayText.textContent = 'Cihaz aranıyor...';
    connectBtn.disabled = true;
    connectBtn.textContent = 'Bağlanılıyor...';

    // Yayıncı cihaza sinyal bağlantısı açıyoruz
    dataConnection = peer.connect('pampisup-cihaz');

    dataConnection.on('open', () => {
      overlayText.textContent = 'Görüntü talep ediliyor...';
      // Cihazdan kamerayı bize iletmesini istiyoruz
      dataConnection.send({ action: 'request_stream' });
    });

    dataConnection.on('data', data => {
      if(data.error) {
        overlayText.textContent = data.error;
        connectBtn.disabled = false;
        connectBtn.textContent = 'Tekrar Dene';
      }
    });

    dataConnection.on('error', err => {
      overlayText.textContent = 'Bağlantı hatası!';
      connectBtn.disabled = false;
      connectBtn.textContent = 'Tekrar Bağlan';
    });

    dataConnection.on('close', () => {
      remoteVideo.classList.remove('active');
      overlay.style.opacity = '1';
      overlayText.textContent = "Bağlantı koptu.";
      connectBtn.disabled = false;
      connectBtn.textContent = 'Tekrar Bağlan';
    });
  });
</script>
</body>
</html>
